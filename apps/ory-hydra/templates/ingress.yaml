{{- if .Values.cors.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ory-hydra-cors
spec:
  headers:
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "Content-Type"
      - "Authorization"
      - "X-HMAC"
    accessControlAllowOriginListRegex:
      {{- toYaml .Values.cors.allowOriginListRegex | nindent 6 }}
    accessControlMaxAge: 600
    addVaryHeader: true
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ory-hydra
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hydra.{{.Values.baseDomain}}`)
      kind: Rule
      services:
        - name: ory-hydra
          port: 4444
      {{- if .Values.cors.enabled }}
      middlewares:
        - name: ory-hydra-cors
      {{- end }}
